# Author: Nuno Aguiar
help:
  text   : Starts a passthrough MCP server that allows the addition of extra tools from other MCP servers to a main one.
  expects: 
  - name     : mainmcp
    desc     : A SLON/JSON connection string to the main MCP server to connect to.
    example  : "(type: remote, url: 'http://server1:8888/mcp')"
    mandatory: true
  - name     : othermcps
    desc     : A list of SLON/JSON connection strings to the other MCP servers to connect to and get tools from.
    example  : "[(type: remote, url: 'http://server2:8888/mcp'), (type: remote, url: 'http://server3:8888/mcp')]"
    mandatory: false
  - name     : usesse
    desc     : If true and onport is defined, returns HTTP MCP responses as SSE events.
    example  : "true"
    mandatory: false
  - name     : uri
    desc     : If onport is defined, exposes the HTTP MCP endpoint on this URI prefix instead of /.
    example  : "/mcp"
    mandatory: false
  - name     : serverdesc
    desc     : Optional JSON/SLON map used to override the exposed server identity/description.
    example  : "(serverInfo: (name: 'my-pass', title: 'My pass server', version: '1.0.0'))"
    mandatory: false
  - name     : includeTool
    desc     : Optional comma-delimited list of tool names to include.
    example  : "tool1,tool2"
    mandatory: false
  - name     : excludeTool
    desc     : Optional comma-delimited list of tool names to exclude.
    example  : "tool3,tool4"
    mandatory: false
  - name     : useprefix
    desc     : Optional comma-delimited list of prefixes applied to tools per connection order; use an empty entry for no prefix.
    example  : "main-,other1-,,other3-"
    mandatory: false

ojob:
  opacks      :
  - openaf: 20260312
  - oJob-common
  daemon      : true
  catch       : printErrnl("[" + job.name + "] "); $err(exception, __, __, job.exec)
  logToConsole: true   # to change when finished
        
todo:
- Init
- Prepare server

jobs:
# ---------------------
- name : Prepare server
  exec : | #js
    ow.loadServer()

    var description
    var tools = []
    var tool2meta = {}
    var toolIndexByName = {}
    var parseListArg = function(value) {
      if (!isString(value)) return []
      return String(value)
        .split(",")
        .map(v => String(v))
    }
    var normalizeToolList = function(value) {
      return parseListArg(value)
        .map(v => v.trim())
        .filter(v => v.length > 0)
    }
    var includeTools = normalizeToolList(args.includeTool)
    var excludeTools = normalizeToolList(args.excludeTool)
    var includeLookup = includeTools.reduce((acc, name) => {
      acc[name] = true
      return acc
    }, {})
    var excludeLookup = excludeTools.reduce((acc, name) => {
      acc[name] = true
      return acc
    }, {})
    var prefixList = parseListArg(args.useprefix).map(v => String(v).trim())
    var getPrefixForConnection = function(index) {
      return index < prefixList.length ? prefixList[index] : ""
    }
    var shouldKeepTool = function(originalName, finalName) {
      var included = includeTools.length === 0 || includeLookup[originalName] === true || includeLookup[finalName] === true
      var excluded = excludeLookup[originalName] === true || excludeLookup[finalName] === true
      return included && !excluded
    }
    var audit = function(event, details) {
      if (!isArray(global.__mcpPassAuditTrail)) global.__mcpPassAuditTrail = []
      var entry = merge({
        at   : new Date().toISOString(),
        event: event
      }, isMap(details) ? details : {})
      global.__mcpPassAuditTrail.push(entry)
      log(`[audit] ${event}: ` + stringify(entry, __, ""))
    }
    var getRequestMeta = function(extraMeta) {
      var meta = isMap(extraMeta) ? clone(extraMeta, true) : {}
      return Object.keys(meta).length > 0 ? meta : __
    }
    var callRegisteredTool = function(toolName, args, extraMeta) {
      var toolMeta = tool2meta[toolName]
      if (!toolMeta) {
        throw new Error(`Tool ${toolName} not found in any MCP server`)
      }
      var mcp = toolMeta.mcp
      if (!mcp) {
        throw new Error(`MCP server for tool ${toolName} not found`)
      }
      var meta = getRequestMeta(extraMeta)
      audit("tool_call", {
        requestedTool: toolName,
        forwardedTool: toolMeta.sourceName,
        connection   : toolMeta.connectionLabel,
        prefix       : toolMeta.prefix
      })
      try {
        return isDef(meta)
          ? mcp.callTool(toolMeta.sourceName, args, meta)
          : mcp.callTool(toolMeta.sourceName, args)
      } catch(e) {
        logErr(`Failed to call tool ${toolName} on MCP server (${toolMeta.sourceName}): ${e}`)
        audit("tool_error", {
          requestedTool: toolName,
          forwardedTool: toolMeta.sourceName,
          connection   : toolMeta.connectionLabel,
          error        : String(isDef(e.message) ? e.message : e)
        })
        if (isDef(e.javaException)) e.javaException.printStackTrace()
        return {
            content: [{
                type: "text",
                text: String(isDef(e.message) ? e.message : e)
            }],
            isError: true
        }
      }
    }
    var registerToolsFromConnection = function(mcp, connectionIndex, connectionLabel) {
      var registered = 0
      var _tools = mcp.listTools()
      if (isDef(_tools.tools)) {
        _tools = _tools.tools
      } else {
        log(`No tools found in ${connectionLabel} description`)
        _tools = []
      }

      var prefix = getPrefixForConnection(connectionIndex)
      _tools.forEach(t => {
        var originalName = String(t.name)
        var finalName = prefix + originalName
        if (!shouldKeepTool(originalName, finalName)) return

        var clonedTool = clone(t, true)
        clonedTool.name = finalName

        if (connectionIndex > 0 && isDef(tool2meta[finalName])) {
          logWarn(`Tool '${finalName}' from ${connectionLabel} overwrites previous mapping to '${tool2meta[finalName].sourceName}' on ${tool2meta[finalName].connectionLabel}`)
        }

        tool2meta[finalName] = {
          name           : finalName,
          sourceName     : originalName,
          mcp            : mcp,
          prefix         : prefix,
          connectionIndex: connectionIndex,
          connectionLabel: connectionLabel
        }
        if (isDef(toolIndexByName[finalName])) {
          tools[toolIndexByName[finalName]] = clonedTool
        } else {
          toolIndexByName[finalName] = tools.length
          tools.push(clonedTool)
        }
        registered++
      })

      return registered
    }

    // Get the description from the main MCP server and store it in a global variable for later use by the tools
    try {
      log("Getting description from main MCP server...")
      var mainmcp = global.connections[0]
      if (isUnDef(mainmcp)) {
        throw new Error(`Main MCP server connection not found`)
      }
      var desc = mainmcp.getInfo()
      description = desc
      log(`Got description from main MCP server: ` + af.toSLON(description))

      var _tools = registerToolsFromConnection(mainmcp, 0, "main MCP server")
      log(`Registered ${_tools} tools from main MCP server`)
    } catch(e) {
      logErr(`Failed to get description from main MCP server: ${e}`)
      if (isDef(e.javaException)) e.javaException.printStackTrace()
      description = {
        name: "MCP server",
        version: "1.0.0",
        tools: []
      }
    }

    // Get the tools from the other MCP connections and store them in a global variable for later use by the tools
    for (var i = 1; i < global.connections.length; i++) {
      try {
        log(`Getting description from MCP server #${i}...`)
        var mcp = global.connections[i]
        var _tools = registerToolsFromConnection(mcp, i, `MCP server #${i}`)
        log(`Registered ${_tools} tools from MCP server #${i}`)
      } catch(e) {
        logErr(`Failed to get description from MCP server #${i}: ${e}`)
        if (isDef(e.javaException)) e.javaException.printStackTrace()
      }
    }
    
    // Merge the description from the main MCP server with the tools from the other MCP servers and store it in a global variable for later use by the tools
    description = merge({
      protocolVersion: "2024-11-05",
      serverInfo: {
          name: "OpenAF",
          title: "OpenAF server",
          version: "1.0.0"
      },
      capabilities: {
          prompts: {
              listChanged: true
          },
          tools: {
              listChanged: true
          }
      }
    }, description)

    if (isString(args.serverdesc) && args.serverdesc.trim().length > 0) {
      try {
        var serverDesc = af.fromJSSLON(args.serverdesc)
        if (!isMap(serverDesc)) throw new Error("serverdesc must evaluate to a map/object")
        if (isMap(serverDesc.serverInfo) || isMap(serverDesc.capabilities) || isDef(serverDesc.protocolVersion)) {
          description = merge(description, serverDesc)
        } else {
          description.serverInfo = merge(description.serverInfo, serverDesc)
        }
      } catch(e) {
        logErr(`Failed to parse serverdesc: ${e}`)
        if (isDef(e.javaException)) e.javaException.printStackTrace()
      }
    }

    // Create a function for each tool that calls the tool on the corresponding MCP server and store them in a global variable for later use by the tools
    var fns = {}
    tools.forEach(tl => {
      var toolName = tl.name
      fns[toolName] = function(args) {
        return callRegisteredTool(toolName, args)
      }
    })

    // Create a function for each RPC method that calls the corresponding function and store them in a global variable for later use by the tools
    var getRpcFns = function(reqMeta) {
      return {
      "initialize"               : params => description,
      "notifications/initialized": params => ({}),
      "tools/call"               : params => {
        var toolName = params.name
        var args = params.arguments
        if (!toolName) {
          throw new Error(`Tool name is required in the request body`)
        }
        // Find the tool in the list of tools from the other MCP servers
        var tool = tools.find(t => t.name === toolName)
        if (!tool) {
          throw new Error(`Tool ${toolName} not found in any MCP server`)
        }
        return callRegisteredTool(toolName, args, reqMeta)
      },
      "tools/list"               : params => {
        return { tools: tools }
      },
      "prompts/list"             : params => ([])
    }
    }

    // Start the MCP server using HTTP or stdio based on the presence of the onport argument
    if (isDef(args.onport)) {
      var routeURI = String(_$(args.uri, "uri").isString().default("/")).trim()
      if (routeURI.length == 0) routeURI = "/"
      if (!routeURI.startsWith("/")) routeURI = "/" + routeURI
      if (routeURI.length > 1 && routeURI.endsWith("/")) routeURI = routeURI.replace(/\/+$/, "")

      log(`Starting HTTP MCP server on port ${args.onport} with URI ${routeURI}...`)
      var hs = ow.server.httpd.start(args.onport)
      ow.server.httpd.route(hs, {
        [routeURI]: function(req, aHs) {
          var reqMeta = isMap(req) && isMap(req.header) ? { headers: clone(req.header, true) } : __
          var _rpcFns = getRpcFns(reqMeta)
          if (toBoolean(args.usesse)) {
            var _rpcRes = ow.server.httpd.replyJSONRPC(aHs, req, _rpcFns, logErr)

            var body = (isDef(req.files) && isDef(req.files.postData)) ? req.files.postData : __
            if (isUnDef(body) && isDef(req.data)) body = req.data

            var reqObj
            try {
              reqObj = jsonParse(body)
            } catch(e) {
              return { data: "Invalid JSON", mimetype: "text/plain", status: 400, header: {} }
            }

            // Notifications don't require a response payload.
            if (isUnDef(reqObj.id)) {
              return { data: "", mimetype: "text/plain", status: 204, header: {} }
            }

            var pis = new java.io.PipedInputStream()
            var pos = new java.io.PipedOutputStream(pis)

            $doV(function() {
              try {
                var _payload = _rpcRes
                if (isMap(_rpcRes) && isDef(_rpcRes.data)) _payload = _rpcRes.data
                if (isString(_payload)) {
                  try { _payload = jsonParse(_payload) } catch(__e) {}
                }

                if (isDef(_payload) && _payload !== "") {
                  var msg = "event: message\n"
                  msg += "data: " + JSON.stringify(_payload) + "\n\n"
                  pos.write(af.fromString2Bytes(msg))
                  pos.flush()
                }
              } catch(e) {
                try {
                  var errMsg = "event: error\n"
                  errMsg += "data: " + JSON.stringify({ message: String(e) }) + "\n\n"
                  pos.write(af.fromString2Bytes(errMsg))
                  pos.flush()
                } catch(e2) {
                  logErr("MCP stream error: " + String(e2))
                }
              } finally {
                try { pos.close() } catch(e) {}
              }
            })

            return {
              status  : 200,
              mimetype: "text/event-stream",
              stream  : pis,
              header  : {
                "Cache-Control"    : "no-cache, no-transform",
                "Connection"       : "keep-alive",
                "Content-Encoding" : "identity",
                "X-Accel-Buffering": "no"
              }
            }
          }

          return ow.server.httpd.replyMCP(aHs, req, _rpcFns, logErr)
        }
      }) 
    } else {
      ow.server.mcpStdio(description, tools, fns)
    }

# -----------
- name : Init
  check:
    in:
      mainmcp    : isString
      othermcps  : isString.default("[]")
      usesse     : toBoolean.isBoolean.default(false)
      uri        : isString.default("/")
      serverdesc : isString.default("")
      includeTool: isString.default("")
      excludeTool: isString.default("")
      useprefix  : isString.default("")
  exec : | #js
    // Initialize the main MCP connection and store it in a global variable for later use by the tools
    global.connections = []
    global.__mcpPassAuditTrail = []

    // Connect to the main MCP server and store the connection in the global variable
    try {
      log("Connecting to main MCP server...")
      var mainmcp = $mcp(af.fromJSSLON(args.mainmcp))
      mainmcp.initialize()
      global.connections.push(mainmcp)
    } catch(e) {
      logErr(`Failed to connect to main MCP server: ${e}`)
      if (isDef(e.javaException)) e.javaException.printStackTrace()
    }

    // Connect to the other MCP servers
    var othermcps = af.fromJSSLON(args.othermcps)
    if (isArray(othermcps)) {
      // Connect to the other MCP servers and store their connections in the global variable
      pForEach(othermcps, (mcp, i) => {
        try {
          log(`Connecting to MCP server #${i+1}...`)
          var mcp = $mcp(mcp)
          mcp.initialize()
          global.connections.push(mcp)
        } catch(e) {
          logErr(`Failed to connect to MCP server #${i+1}: ${e}`)
          if (isDef(e.javaException)) e.javaException.printStackTrace()
        }
      })
    }
