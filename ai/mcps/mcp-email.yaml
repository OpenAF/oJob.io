# Author: Nuno Aguiar
help:
  text   : A STDIO MCP email server
  expects:
  - name     : smtpserver
    desc     : SMTP server hostname
    example  : smtp.gmail.com
    mandatory: true
  - name     : from
    desc     : Default FROM email address
    example  : sender@example.com
    mandatory: true
  - name     : user
    desc     : SMTP authentication user
    example  : sender@example.com
    mandatory: false
  - name     : pass
    desc     : SMTP authentication password or app token
    example  : mySecret
    mandatory: false
  - name     : ssl
    desc     : Use SSL to connect to the SMTP server
    example  : "true"
    mandatory: false
  - name     : tls
    desc     : Use STARTTLS to connect to the SMTP server
    example  : "true"
    mandatory: false
  - name     : html
    desc     : Treat message bodies as HTML (otherwise plain text)
    example  : "true"
    mandatory: false
  - name     : markdown
    desc     : "Treat message bodies as Markdown and convert them to email-safe HTML using md2email"
    example  : "true"
    mandatory: false
  - name     : markdowntheme
    desc     : "md2email theme name to use when converting Markdown (for example: default or dark)"
    example  : default
    mandatory: false
  - name     : port
    desc     : SMTP server port (defaults to provider standard)
    example  : "587"
    mandatory: false
  - name     : debug
    desc     : Enable JavaMail debug logs
    example  : "true"
    mandatory: false
  - name     : onport
    desc     : If defined starts a MCP server on the provided port
    example  : "8888"
    mandatory: false
  - name     : forcebcc
    desc     : If defined forces all emails to be sent BCC to the provided address (for testing)
    example  : bcc@example.com
    mandatory: false

todo:
- Init email client
- Cleanup email client
- (if    ): "isDef(args.onport)"
  ((then)):
  - (httpdStart   ): "${onport:-8080}"
  - (httpdHealthz ): "${onport:-8080}"
  - (httpdMetrics ): "${onport:-8080}"
  - (httpdMCP     ): "${onport:-8080}"
    ((description)): &MCPSERVER
      serverInfo:
        name   : mini-a-email
        title  : OpenAF mini-a MCP email server
        version: 1.0.0
    ((fnsMeta)): &MCPFNSMETA
      sendEmail:
        name       : sendEmail
        description: Sends an email (text, HTML or Markdown converted to email HTML) using the configured SMTP server.
        inputSchema:
          type      : object
          properties:
            subject:
              type        : string
              description : Subject of the email.
            body:
              type        : string
              description : Body of the email message.
            to:
              type        : array
              description : List of TO recipient email addresses.
              items:
                type: string
            cc:
              type        : array
              description : List of CC recipient email addresses.
              items:
                type: string
            bcc:
              type        : array
              description : List of BCC recipient email addresses.
              items:
                type: string
            from:
              type        : string
              description : Optional FROM email address override.
            html:
              type        : boolean
              description : Optional per-message override to treat the body as raw HTML.
            markdown:
              type        : boolean
              description : "Optional per-message override to treat the body as Markdown and convert it to email-safe HTML."
            markdownTheme:
              type        : string
              description : "Optional md2email theme name to use for Markdown conversion."
          required: [ subject, body, to ]
        annotations:
          title         : sendEmail
          readOnlyHint  : false
          idempotentHint: false
    ((fns    )): &MCPFNS
      sendEmail: Send email
  ((else)):
  - (stdioMCP ): *MCPSERVER
    ((fnsMeta)): *MCPFNSMETA
    ((fns    )): *MCPFNS

ojob:
  opacks      :
  - openaf     : 20250915
  - oJob-common: 20250914
  catch       : printErrnl("[" + job.name + "] "); $err(exception, __, __, job.exec)
  logToConsole: false   # to change when finished
  argsFromEnvs: true
  daemon      : true
  unique      :
    pidFile     : .mcp-email.pid
    killPrevious: true

include:
- oJobMCP.yaml

jobs:
# ---------------------------
- name : Init email client
  check:
    in:
      smtpserver: isString
      from      : isString
      user      : isString.default(__)
      pass      : isString.default(__)
      ssl       : toBoolean.isBoolean.default(false)
      tls       : toBoolean.isBoolean.default(false)
      html      : toBoolean.isBoolean.default(false)
      markdown  : toBoolean.isBoolean.default(false)
      markdowntheme: isString.default("default")
      port      : toNumber.isNumber.default(__)
      debug     : toBoolean.isBoolean.default(false)
      forcebcc  : isString.default(__)
  exec : | #js
    plugin("Email")
    global.emailFrom         = args.from
    global.emailContainsHTML = args.html
    global.emailContainsMarkdown = args.markdown
    global.emailMarkdownTheme = args.markdowntheme
    global.emailClient       = new Email(args.smtpserver, args.from, args.ssl, args.tls, args.html || args.markdown)
    global.forceBCC          = isDef(args.forcebcc) ? args.forcebcc : __

    global.ensureMd2Email = function() {
      if (isDef(global.md2email) && isDef(global.MD2Email)) return true

      var _miniAPath = getOPackPath("mini-a")
      var _candidatePaths = []

      if (isString(_miniAPath)) {
        _candidatePaths.push(String((new java.io.File(_miniAPath + "/../openaf-opacks/md2email")).getCanonicalPath()))
      }

      _candidatePaths.push(String((new java.io.File("../openaf-opacks/md2email")).getCanonicalPath()))

      var _installedMd2Email = getOPackPath("md2email")
      if (isString(_installedMd2Email)) _candidatePaths.push(_installedMd2Email)

      _candidatePaths = _candidatePaths.filter(function(_path, _idx, _arr) {
        return isString(_path) && _path.length > 0 && _arr.indexOf(_path) == _idx
      })

      for (var i = 0; i < _candidatePaths.length; i++) {
        var _path = _candidatePaths[i]
        if (!io.fileExists(_path + "/md2email.js")) continue

        loadExternalJars(_path)
        loadLib(_path + "/md2email.js")

        if (isDef(global.md2email) && isDef(global.MD2Email)) return true
      }

      throw "Couldn't load md2email from: " + stringify(_candidatePaths, __, "")
    }

    if (global.emailContainsMarkdown) {
      global.ensureMd2Email()
    }

    if (isDef(args.port)) {
      global.emailClient.setPort(args.port)
    }

    if (args.debug) {
      global.emailClient.getEmailObj().setDebug(true)
    }

    if (isDef(args.user) && isDef(args.pass)) {
      global.emailClient.login(args.user, args.pass)
    }

# ------------------------------
- name : Cleanup email client
  type : shutdown
  exec : | #js
    if (isDef(global.emailClient)) {
      try {
        if (isDef(global.emailClient.close)) {
          global.emailClient.close()
        }
      } catch(e) {
        logErr("Error closing email client: " + e)
      }
      global.emailClient = undefined
    }

# -----------------
- name : Send email
  check:
    in:
      subject: isString
      body   : isString
      to     : isArray
      cc     : isArray.default(__)
      bcc    : isArray.default(__)
      from   : isString.default(__)
      html   : toBoolean.isBoolean.default(__)
      markdown: toBoolean.isBoolean.default(__)
      markdownTheme: isString.default(__)
  exec : | #js
    if (!isDef(global.emailClient)) {
      return "[ERROR] Email client not initialised"
    }

    var _to  = args.to
    var _cc  = isDef(args.cc) ? args.cc : []
    var _bcc = isDef(args.bcc) ? args.bcc : []
    var _from = isDef(args.from) ? args.from : global.emailFrom
    var _sendAsMarkdown = isDef(args.markdown) ? args.markdown : global.emailContainsMarkdown
    var _sendAsHTML = isDef(args.html) ? args.html : global.emailContainsHTML
    var _markdownTheme = isDef(args.markdownTheme) ? args.markdownTheme : global.emailMarkdownTheme

    // If forceBCC is defined, override all BCC recipients
    if (isDef(global.forceBCC)) {
      if (!isArray(_bcc)) {
        _bcc = []
      }
      if (!arrayContains(_bcc, global.forceBCC)) {
        _bcc.push(global.forceBCC)
      }
    }

    if (!isArray(_to) || _to.length == 0) {
      return "[ERROR] At least one TO address is required"
    }

    try {
      var messageBody = args.body
      if (_sendAsMarkdown) {
        global.ensureMd2Email()
        messageBody = md2email.toEmail(messageBody, { yamlFrontMatter: true }, {
          title: args.subject,
          subject: args.subject,
          theme: _markdownTheme,
          wrap : true
        })
        global.emailClient.setHTML(messageBody)
        messageBody = ""
      } else if (_sendAsHTML) {
        global.emailClient.setHTML(messageBody)
        messageBody = ""
      }
      global.emailClient.send(args.subject, messageBody, _to, _cc, _bcc, _from)
      return "Email sent"
    } catch(e) {
      logErr("Error sending email: " + e)
      return "[ERROR] Couldn't send email."
    }
