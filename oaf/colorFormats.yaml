help:
  text   : Prints examples of OpenAF's color formats to use
  expects: 
  - name     : op
    desc     : 'Choose an operation between: list, all, browse, set, unset and sample'
    example  : 'list'
    mandatory: false
    options  :
    - list
    - all
    - browse
    - set
    - unset
    - sample
  - name     : theme
    desc     : 'Choose a theme to set directly; if omitted with op=set an interactive browser will be used'
    example  : 'default'
    mandatory: false
    options  :
    - basic
    - default
    - mono
    - mono2
    - redmono
    - blue
    - jeans
    - thin
    - thin-intense
    - thin-intense-bold
    - thin-light
    - thin-italic
    - thin-light-italic
    - thin-bold
    - thin-light-bold
    - dark-slate
    - dark-amber
    - solarized-dark
    - matrix
    - night-owl
    - forest
    - light-paper
    - light-pastel
    - solarized-light
    - ice
    - terminal-amber
    - rose
    - yellow

todo:
- (optionOn   ): op
  ((lowerCase)): true
  ((todos    )):
    list :
    - Print samples
    all  :
    - Print all samples
    browse:
    - Browse themes
    set  :
    - Set or browse a theme
    unset:
    - Unset a theme
    sample:
