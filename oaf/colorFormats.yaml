ojob:
  opacks      :
  - openaf: 20240220
  catch       : printErrnl("[" + job.name + "] "); if (isDef(exception.javaException)) exception.javaException.printStackTrace(); else printErr(exception)
  logToConsole: false   # to change when finished
        

jobs:
# ---------------------------
- name : Set or browse a theme
  exec : |
      if (isString(args.theme) && args.theme.length > 0) {
        $job("Apply theme", { theme: args.theme, init: args.init })
      } else {
        $job("Browse themes")
      }

# ------------------
- name : Apply theme
  check:
    in:
      theme: isString
  exec : |
      var _t = $from(args.init.themes).equals("name", args.theme)
      if (_t.none()) throw "Theme not found"

      _t = _t.at(0)

      var _new = "// Theme: " + _t.name + "\n" + "__colorFormat=merge(__colorFormat," + stringify(_t.format, __, "") + ")\n"
      var fprof = __gHDir() + "/" + OPENAFPROFILE

      var ctn = io.fileExists(fprof) ? io.readFileString(fprof) : ""
      var origCtn = ctn
      if (ctn.match(/\/\/ Theme: /)) {
        ctn = ctn.replace(/\/\/ Theme: .*\n__colorFormat=merge\(__colorFormat,.+\)\n/, _new)
      } else {
        ctn += _new
      }

      if (ctn != origCtn) {
        io.writeFileString(fprof, ctn)
        print("Theme set to " + _t.name)
      } else {
        print("Theme already set to " + _t.name)
      }

# -------------------
- name : Browse themes
  exec : | #js
      _$(args.init.themes, "init.themes").isArray().$_()

      if (!__flags.ANSICOLOR_ASK) {
        var _fallback = askChoose("Theme", $from(args.init.themes).sort("name").select(r => r.name), 10)
        if (isDef(_fallback)) {
          var _fallbackTheme = $from(args.init.themes).sort("name").at(_fallback)
          $job("Apply theme", { theme: _fallbackTheme.name })
        }
        return
      }

      plugin("Console")
      ow.loadFormat()

      var _themes = $from(args.init.themes).sort("name").select()
      var _con = new Console()
      var _termWidth = _con.getConsoleReader().getTerminal().getWidth()
      var _maxDisplay = Math.min(8, _themes.length)
      var _prompt = ansiColor(__colorFormat.askPre, "? ") +
                    ansiColor(__colorFormat.askQuestion, "Browse color themes") + " " +
                    ansiColor("FAINT,ITALIC", "(arrows to move, type to filter, enter to set, esc to cancel)")
      var _filter = ""
      var _option = 0
      var _span = 0
      var _cancelled = false
      var _firstTime = true
      var _chooseLine = __colorFormat.askChooseChars.chooseLine
      var _chooseUp = __colorFormat.askChooseChars.chooseUp
      var _chooseDown = __colorFormat.askChooseChars.chooseDown
      var _chooseLineSize = visibleLength(_chooseLine) + 1
      var _chooseDirSize = Math.max(visibleLength(_chooseUp), visibleLength(_chooseDown)) + 1
      var _maxName = _themes.reduce((a, b) => a.length > b.name.length ? a : b.name, "").length
      var _previewHeight = 10

      var _get = (aObj, aPath, aDefault) => {
        var _r = aObj
        aPath.split(".").forEach(k => {
          if (isDef(_r) && isMap(_r) && isDef(_r[k])) _r = _r[k]; else _r = __
        })
        return isDef(_r) ? _r : aDefault
      }

      var _style = (aValue, aDefault) => {
        if (isString(aValue) && aValue.length > 0) return aValue
        return isDef(aDefault) ? aDefault : "RESET"
      }

      var _joinStyle = arr => arr.filter(v => isString(v) && v.length > 0).join(",")

      var _clip = (aText, aWidth) => {
        aText = String(aText)
        if (visibleLength(aText) <= aWidth) return aText + repeat(aWidth - visibleLength(aText), " ")
        return aText
      }

      var _preview = aTheme => {
        var _fmt = aTheme.format
        var _md = _get(_fmt, "md", {})
        
        var _sample = {}
        _sample.keyStyle = _fmt.key
        _sample.numberStyle = _fmt.number
        _sample.stringStyle = _fmt.string
        _sample.booleanStyle = _fmt.boolean
        _sample.dateStyle = _fmt.date
        _sample.dateValue = (new Date()).toISOString().substring(0, 10)
        _sample.tableTitle = _get(_fmt, "table.title")
        _sample.tableLines = _get(_fmt, "table.lines")
        _sample.tableValue = _get(_fmt, "table.value")
        _sample.tableBandRow = _get(_fmt, "table.bandRow", "")
        _sample.h1 = _get(_md, "heads.h1")
        _sample.linkText = _get(_md, "link.text")
        _sample.linkUrl = _get(_md, "link.url")
        _sample.codeBlockLine = _get(_md, "codeBlock.line")
        _sample.codeBlockText = _get(_md, "codeBlock.text")
        _sample.treeLines = _get(_fmt, "tree.lines")
        _sample.treeCurved = _get(_fmt, "tree.curved", false)

        var _lines = [
          ansiColor("BOLD", "Preview: ") + ansiColor(_style(_sample.keyStyle), aTheme.name),
          ansiColor(_style(_sample.keyStyle), "key") + ": " +
          ansiColor(_style(_sample.numberStyle), "123") + " " +
          ansiColor(_style(_sample.stringStyle), "\"string\"") + " " +
          ansiColor(_style(_sample.booleanStyle), "true") + " " +
          ansiColor(_style(_sample.dateStyle), _sample.dateValue),
          ansiColor(_style(_sample.tableTitle), "id  value      ok"),
          ansiColor(_style(_sample.tableLines), "--  ---------- --"),
          ansiColor(_joinStyle([_style(_sample.tableValue), _sample.tableBandRow]), "1   alpha      true"),
          ansiColor(_style(_sample.tableValue), "2   beta       false"),
          ansiColor(_style(_sample.h1), "# Heading") + " " +
          ansiColor(_style(_sample.linkText), "docs") +
          ansiColor(_style(_sample.linkUrl), " (https://example.org)"),
          ansiColor(_style(_sample.codeBlockLine), "│") + " " +
          ansiColor(_style(_sample.codeBlockText), "const theme = \"" + aTheme.name + "\""),
          ansiColor("FAINT", "Tree: ") +
          ansiColor(_style(_sample.treeLines, "RESET"), _sample.treeCurved ? "╰─ node" : "+- node")
        ]

        while (_lines.length < _previewHeight) _lines.push("")
        return _lines.slice(0, _previewHeight).map(l => _clip(l, _termWidth))
      }

      var _draw = () => {
        if (_option > (_maxDisplay - 2)) _span = _option - _maxDisplay + 1; else _span = 0

        var _list = _themes
          .map((t, i) => {
            if (i < _span || i - _span >= _maxDisplay) return __

            var _marker = (( _span > 0 && i == _span) ? _chooseUp : ((i - _span == _maxDisplay - 1 && _themes.length > _maxDisplay) ? _chooseDown : " "))
            var _text = t.name

            if (_filter.length > 0) {
              var _idx = _text.toLowerCase().indexOf(_filter.toLowerCase())
              if (_idx >= 0) {
                _text = _text.substring(0, _idx) +
                        ansiColor(__colorFormat.askChooseFilter, _text.substring(_idx, _idx + _filter.length)) +
                        _text.substring(_idx + _filter.length)
              }
            }

            var _pad = repeat(Math.max(0, _maxName - visibleLength(t.name) + (i == _option ? _chooseLineSize : _chooseDirSize) - 1), " ")
            if (i == _option) {
              return ansiColor(__colorFormat.askChoose, _chooseLine + " " + _text + _pad)
            } else {
              return ansiColor("RESET", ansiColor(__colorFormat.askChoose, _marker) + " " + _text + _pad)
            }
          })
          .filter(isDef)

        while (_list.length < _maxDisplay) _list.push(repeat(_maxName + _chooseDirSize, " "))

        var _screen = _list
          .concat([repeat(_termWidth, " ")])
          .concat(_preview(_themes[_option]))
          .join("\n")

        if (!_firstTime) ow.format.string.ansiMoveUp(_maxDisplay + _previewHeight + 1); else _firstTime = false
        printErr(_screen)
      }

      printErr("\x1B[?25l" + _prompt)

      var c = 0
      do {
        _draw()
        var _c = _con.readChar("")
        c = String(_c).charCodeAt(0)

        if (c == 27) {
          c = String(_con.readChar("")).charCodeAt(0)
          if (c == 27) {
            _cancelled = true
            break
          } else {
            _filter = ""
            if (c == 91 || c == 79) {
              c = String(_con.readChar("")).charCodeAt(0)
              if (c == 66) _option = (_option + 1) % _themes.length
              if (c == 65) _option = (_option - 1 + _themes.length) % _themes.length
            }
          }
        } else {
          if (c == 127) {
            if (_filter.length > 0) _filter = _filter.substring(0, _filter.length - 1)
          } else if (c >= 32 && c < 255) {
            _filter += _c
          }

          if (_filter.length > 0) {
            var _found = _themes.findIndex(v => v.name.toLowerCase().indexOf(_filter.toLowerCase()) >= 0)
            if (_found >= 0) _option = _found
          }
        }
      } while (c != 13 && c != 10)

      ow.format.string.ansiMoveUp(_maxDisplay + _previewHeight + 1)
      printErr(range(_maxDisplay + _previewHeight + 1).map(r => repeat(_termWidth, " ")).join("\n"))
      ow.format.string.ansiMoveUp(_maxDisplay + _previewHeight + 2)
      printErrnl(repeat(_termWidth, " ") + "\r")

      if (!_cancelled) {
        var _selected = _themes[_option]
        printErr("\n\x1b[1A\x1b[0G" + ansiColor(__colorFormat.askPos, "\u2713") + " Browse color themes[" + ansiColor(__colorFormat.string, _selected.name) + "]")
        ow.format.string.ansiMoveUp(2)
        printErr("\x1B[?25h\n")

        $job("Apply theme", { theme: _selected.name, init: args.init })
        $job("Sample print", { theme: _selected, init: args.init })
      } else {
        ow.format.string.ansiMoveUp(2)
        printErr("\x1B[?25h\n")
      }

# --------------------
- name : Unset a theme
  exec : |
      var fprof = __gHDir() + "/" + OPENAFPROFILE
      if (io.fileExists(fprof) == false) throw "No theme set"

      var ctn = io.readFileString(fprof)
      var origCtn = ctn
      if (ctn.match(/\/\/ Theme: /)) {
        ctn = ctn.replace(/\/\/ Theme: .*\n__colorFormat=merge\(__colorFormat,.+\)\n/, "")
        io.writeFileString(fprof, ctn)
        print("Theme unset")
      } else {
        print("No theme set")
      }

# -------------------
- name : Sample print
  check:
    in:
      theme: isMap
  exec : |
    _$(args.theme.format, "theme.format").isMap().$_()
    _$(args.theme.name, "theme.name").isString().$_()

    __colorFormat = merge(__colorFormat, args.theme.format)

    $o("---", {__format:'md'})
    $o("**Theme:** " + args.theme.name + "\n", {__format:'md'})
    $o( ({number:123,string:'string',boolean:true,date:new Date(),default:__,array:[1,2,3],table:printTable([{id:1,str:'id1',b:true},{id:2,str:'id2',b:false},{id:3,str:'id3',b:true}],20,__,__,__,__,__,__,true).trim()}) )
    $o("```\n__colorFormat=merge(__colorFormat," + stringify(__colorFormat,__,"") + ")\n```", {__format:'md'} )

# -------------------
- name : Print sample
  exec : |
    $o( ({number:123,string:'string',boolean:true,date:new Date(),default:__,array:[1,2,3],table:printTable([{id:1,str:'id1',b:true},{id:2,str:'id2',b:false},{id:3,str:'id3',b:true}],20,__,__,__,__,__,__,true).trim()}) )

# --------------------
- name : Print samples
  exec : |
    $from(args.init.themes).sort("name").select(t => $job("Sample print", { theme: t }))

# ------------------------
- name : Print all samples
  exec : | 
    $from(args.init.themes).sort("name").select(t => {
      print("// Theme: " + t.name)
      print("// __colorFormat=merge(__colorFormat," + stringify(t.format, __, "") + ")")
      print("")
    })

